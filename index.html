<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rafa AI</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:system-ui, Arial;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 18px;
background:#020617;
border-bottom:1px solid #1e293b;
font-weight:600;
}

/* REFRESH BUTTON */

#refresh{
background:#2563eb;
border:none;
padding:8px 14px;
border-radius:8px;
color:white;
cursor:pointer;
}

#refresh:hover{
background:#1d4ed8;
}

/* CHAT AREA */

#chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:16px;
scroll-behavior:smooth;
}

/* BUBBLE */

.user{
align-self:flex-end;
background:#2563eb;
padding:12px 16px;
border-radius:16px 16px 4px 16px;
max-width:75%;
word-wrap:break-word;
}

.ai{
align-self:flex-start;
background:#1e293b;
padding:12px 16px;
border-radius:16px 16px 16px 4px;
max-width:75%;
word-wrap:break-word;
}

/* INPUT AREA */

#inputArea{
display:flex;
padding:14px;
gap:10px;
background:#020617;
border-top:1px solid #1e293b;
}

/* INPUT */

#question{
flex:1;
padding:12px;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
font-size:15px;
outline:none;
}

/* BUTTON */

button{
padding:12px 18px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

/* TYPING */

.typing{
display:flex;
gap:5px;
}

.dot{
width:6px;
height:6px;
background:white;
border-radius:50%;
animation:blink 1.2s infinite;
}

.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}

@keyframes blink{
0%{opacity:0}
50%{opacity:1}
100%{opacity:0}
}

/* RESPONSIVE */

@media (max-width:600px){

header{
font-size:14px;
}

#question{
font-size:14px;
}

button{
padding:10px 14px;
}

.user,.ai{
max-width:85%;
}

}

</style>

</head>

<body>

<header>

<div>Rafa AI</div>

<button id="refresh" onclick="refreshChat()">Refresh</button>

</header>

<div id="chat"></div>

<div id="inputArea">

<input
id="question"
placeholder="Tanya apa saja..."
onkeydown="enter(event)"
>

<button onclick="kirim()">Kirim</button>

</div>

<script src="script.js"></script>

<script>

function enter(e){
if(e.key==="Enter"){
kirim();
}
}

function refreshChat(){
document.getElementById("chat").innerHTML="";
}

async function kirim(){

let input = document.getElementById("question");
let chat = document.getElementById("chat");

let teks = input.value;

if(teks.trim()==="") return;

chat.innerHTML += `<div class="user">${teks}</div>`;

input.value="";

let aiBubble = document.createElement("div");
aiBubble.className="ai";

aiBubble.innerHTML = `
<div class="typing">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>
`;

chat.appendChild(aiBubble);

chat.scrollTop = chat.scrollHeight;

let jawaban = await tanyaAI(teks);

aiBubble.innerText = jawaban;

chat.scrollTop = chat.scrollHeight;

}

</script>

</body>
</html>
