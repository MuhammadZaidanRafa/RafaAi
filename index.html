<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rafa AI</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */

#sidebar{
width:230px;
background:#020617;
border-right:1px solid #1e293b;
display:flex;
flex-direction:column;
}

#logo{
padding:20px;
font-size:20px;
font-weight:bold;
text-align:center;
border-bottom:1px solid #1e293b;
}

#newchat{
margin:15px;
padding:10px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
}

#newchat:hover{
background:#1d4ed8;
}

/* MAIN */

#main{
flex:1;
display:flex;
flex-direction:column;
}

/* HEADER */

header{
padding:15px;
text-align:center;
font-weight:bold;
background:#020617;
border-bottom:1px solid #1e293b;
}

/* CHAT AREA */

#chat{
flex:1;
overflow-y:auto;
padding:25px;
display:flex;
flex-direction:column;
gap:18px;
scroll-behavior:smooth;
}

/* BUBBLE */

.user{
align-self:flex-end;
background:#2563eb;
padding:12px 16px;
border-radius:15px 15px 3px 15px;
max-width:65%;
}

.ai{
align-self:flex-start;
background:#1e293b;
padding:12px 16px;
border-radius:15px 15px 15px 3px;
max-width:65%;
}

/* INPUT */

#inputArea{
display:flex;
padding:15px;
background:#020617;
border-top:1px solid #1e293b;
}

#question{
flex:1;
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
outline:none;
background:#1e293b;
color:white;
}

button{
margin-left:10px;
padding:12px 20px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

/* LOADING */

.typing{
display:flex;
gap:5px;
}

.dot{
width:6px;
height:6px;
background:white;
border-radius:50%;
animation:blink 1s infinite;
}

.dot:nth-child(2){
animation-delay:.2s;
}

.dot:nth-child(3){
animation-delay:.4s;
}

@keyframes blink{
0%{opacity:0}
50%{opacity:1}
100%{opacity:0}
}

</style>
</head>

<body>

<div id="sidebar">

<div id="logo">Rafa AI</div>

<button id="newchat" onclick="newChat()">+ Chat Baru</button>

</div>

<div id="main">

<header>Rafa AI Assistant</header>

<div id="chat"></div>

<div id="inputArea">
<input id="question" placeholder="Tanya apa saja..." onkeydown="enter(event)">
<button onclick="kirim()">Kirim</button>
</div>

</div>

<script src="script.js"></script>

<script>

function enter(e){
if(e.key==="Enter"){
kirim();
}
}

function newChat(){
document.getElementById("chat").innerHTML="";
}

async function kirim(){

let input = document.getElementById("question");
let chat = document.getElementById("chat");

let teks = input.value;

if(teks.trim()==="") return;

chat.innerHTML += `<div class="user">${teks}</div>`;

input.value="";

let aiBubble = document.createElement("div");
aiBubble.className="ai";

aiBubble.innerHTML = `
<div class="typing">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>
`;

chat.appendChild(aiBubble);

chat.scrollTop = chat.scrollHeight;

let jawaban = await tanyaAI(teks);

aiBubble.innerText = jawaban;

chat.scrollTop = chat.scrollHeight;

}

</script>

</body>
</html>
